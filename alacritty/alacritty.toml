# Alacritty 設定 — macOS 用 entry
# install.sh が ~/.config/alacritty をこのディレクトリへのシンボリックリンクにする。
# 相対 import は Alacritty 0.13+ で「import 元ファイルからの相対」で解決される。

[general]
import = ["common.toml", "themes/dracula.toml"]

# tmux への接続は .zshrc の tmux-launch（fzf セッションピッカー）が行うため、
# [terminal.shell] は設定しない（-c は非対話シェルになり .zshrc が読まれない）

# startup_mode は OS 別に使い分け（共通設定は common.toml）
[window]
startup_mode = "Windowed"

[font]
size = 16.0
builtin_box_drawing = true

[font.normal]
family = "MesloLGS Nerd Font"
style  = "Regular"

[font.bold]
family = "MesloLGS Nerd Font"
style  = "Bold"

[font.italic]
family = "MesloLGS Nerd Font"
style  = "Italic"

[font.bold_italic]
family = "MesloLGS Nerd Font"
style  = "Bold Italic"
