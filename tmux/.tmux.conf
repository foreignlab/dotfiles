set -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:RGB"


set -g history-limit 50000
set -g automatic-rename on
set -g mouse on

bind | split-window -h
bind - split-window -v
unbind '"'

unbind %

setw -g mode-keys vi

if-shell "uname | grep -q Darwin" "set -g @copy_cmd 'pbcopy'"
if-shell "uname | grep -q Linux"  "set -g @copy_cmd 'win32yank.exe -i --crlf'"

bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y   send-keys -X copy-pipe-and-cancel "perl -pe 'chomp if eof' | #{@copy_cmd}"

set -g status-position bottom

# ---- Dracula テーマ設定 ----
# status-left / status-right / window-status は dracula が管理するため手書きしない。
# git / dir / 言語バージョン / 実行時間は p10k（プロンプト）担当なので tmux には出さない。
set -g @dracula-plugins "cpu-usage ram-usage time"
set -g @dracula-show-powerline true
set -g @dracula-show-left-icon session      # 左にセッション名（"#h | #S" にすると host も併記＝Mac/WSL 判別に有効）
set -g @dracula-time-format "%Y-%m-%d %H:%M" # 日付+24h 時刻（タイムゾーン表記なし）
set -g @dracula-show-flags true              # ウィンドウのフラグ表示
set -g @dracula-refresh-rate 5               # cpu/ram 等の更新間隔(秒)
# cpu/ram はパーセント表示（load average にしたい場合のみ: set -g @dracula-cpu-display-load true）

# 配色カスタム（色解決は ${!colors[0]} の間接展開＝色名はシェル変数名）：
#  - セッション左アイコンは内部的に green を使うのでマゼンタへ再マップ
#  - 本来の緑は dgreen として退避し、CPU ウィジェットへ割り当てる
set -g @dracula-colors "green='#ff79c6'; dgreen='#50fa7b'"
set -g @dracula-cpu-usage-colors "dgreen dark_gray"

# ---- プラグイン（TPM 管理）----
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'dracula/tmux'
set -g @plugin 'sainnhe/tmux-fzf'

run '~/.tmux/plugins/tpm/tpm'

# ---- dracula 読み込み後にウィンドウ表示を上書き（現在ウィンドウの見分けを強化）----
# 現在ウィンドウ = light_purple(青紫)背景＋濃色太字で強調 / 非アクティブ = comment色で減光
setw -g window-status-current-format "#[fg=#282a36,bg=#bd93f9,bold] #I #W#{?window_flags,#{window_flags},} #[default]"
setw -g window-status-format "#[fg=#6272a4,bg=default] #I #W#{?window_flags,#{window_flags},} #[default]"

bind-key "space" run-shell -b "${HOME}/.tmux/plugins/tmux-fzf/scripts/window.sh switch" # `prefix + space`で起動
