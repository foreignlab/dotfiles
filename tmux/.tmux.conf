set -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:RGB"


set -g history-limit 50000
set -g automatic-rename on
set -g mouse on

bind | split-window -h
bind - split-window -v
unbind '"'

unbind %

setw -g mode-keys vi

if-shell "uname | grep -q Darwin" "set -g @copy_cmd 'pbcopy'"
if-shell "uname | grep -q Linux"  "set -g @copy_cmd 'win32yank.exe -i --crlf'"

bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y   send-keys -X copy-pipe-and-cancel "perl -pe 'chomp if eof' | #{@copy_cmd}"

set -g status-position bottom
set -g status-bg colour234
set -g status-fg colour250
set -g status-left  " #S "
set -g status-right "%Y-%m-%d %H:%M "


set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'dracula/tmux'

run '~/.tmux/plugins/tpm/tpm'
